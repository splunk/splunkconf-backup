# pgBackRest configuration for Splunk embedded PostgreSQL.
# Set PG_BACKUP_METHOD=pgbackrest in splunkconf-backup.conf to use this path.
# Backup runs from splunkconf-backup.sh while splunkd and postgres are up.
# Restore runs from splunkconf-restore-pg.sh before splunkd starts.
#
# Install pgBackRest on the host and adjust pg1-path to the Splunk PGDATA
# directory for your version (discover with: find $SPLUNK_HOME/var/packages/data/postgres -name PG_VERSION)

[global]
repo1-path=/opt/splunk/var/backups/pgbackrest
log-path=/opt/splunk/var/log/splunk
log-level-console=info
log-level-file=info

[splunk]
pg1-path=/opt/splunk/var/packages/data/postgres/data
pg1-port=5432
pg1-user=postgres_admin
pg1-database=postgres
